name: PR Review Collect

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: pr-review-collect-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Save PR metadata
        run: |
          mkdir -p ./pr-context
          echo "${{ github.event.pull_request.number }}" > ./pr-context/pr-number
          echo "${{ github.event.pull_request.head.sha }}" > ./pr-context/head-sha
          echo "${{ github.event.pull_request.base.sha }}" > ./pr-context/base-sha
          git diff ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} > ./pr-context/diff.patch

      - uses: actions/upload-artifact@v4
        with:
          name: pr-review-context
          path: ./pr-context/
          retention-days: 1
