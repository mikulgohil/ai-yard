name: PR Security Review Collect

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  contents: read

concurrency:
  group: pr-security-review-collect-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Write PR metadata
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_ACTION: ${{ github.event.action }}
        run: |
          mkdir -p pr-meta
          jq -n \
            --arg pr "$PR_NUMBER" \
            --arg head "$HEAD_SHA" \
            --arg base "$BASE_SHA" \
            --arg action "$EVENT_ACTION" \
            '{pr_number: ($pr|tonumber), head_sha: $head, base_sha: $base, action: $action}' \
            > pr-meta/pr.json

      - uses: actions/upload-artifact@v4
        with:
          name: pr-meta
          path: pr-meta/
          retention-days: 1
